name: Update Boxing Calendar

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-calendar
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check scraper.py tests.py

      - name: Type check
        run: mypy scraper.py

      - name: Run tests
        run: python -m pytest tests.py -v

      - name: Run scraper
        run: python scraper.py

      - name: Commit changes
        run: |
          git config --global user.name 'Boxing Bot'
          git config --global user.email 'bot@noreply.github.com'
          git add boxing_schedule.ics
          if git diff --staged --quiet; then
            echo "No calendar changes to commit."
          else
            git commit -m "Update calendar feed"
            git push
          fi
